name: npm audit

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一早上8点
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --production --audit-level=high
