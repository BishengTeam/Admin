events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    server {
        listen       80;
        server_name  localhost;

        # ── 安全响应头 ──
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # === SPA 缓存策略 ===

        # 1. index.html — 每次验证（304），保证发版后用户拿到新入口
        location = /index.html {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
            add_header Pragma "no-cache" always;
            # 安全头在子 block 中需显式保留
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # 2. 带 hash 的构建产物 — 长期缓存，永远不重新验证
        location /assets/ {
            root   /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # 3. 其他静态文件 (favicon.svg 等)
        location ~* \.(svg|ico|png|jpg|woff2)$ {
            root   /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public" always;
        }

        # 4. SPA fallback — 兜底不缓存，走 index.html
        location / {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }

        # 代理 API 请求到后端
        location /admin/ {
            add_header Cache-Control "no-cache" always;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 代理媒体文件请求到后端
        location /api/media/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
